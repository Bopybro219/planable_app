{% extends 'base.html' %}
{% block title %}{{ title }} | Planira{% endblock %}
{% block content %}
<section class="empty-state surface-panel centered-panel">
  <span class="eyebrow">Something needs attention</span>
  <h1>{{ title }}</h1>
  <p class="page-subtitle">{{ message }}</p>
  <div class="page-head-actions">
    <a class="btn-primary-planira" href="{{ url_for('index') }}">Back home</a>
    {% if current_user %}
      <a class="btn-secondary-planira" href="{{ url_for('search') }}">Search places</a>
    {% endif %}
  </div>
</section>
{% endblock %}
